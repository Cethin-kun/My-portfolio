<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Personal Album</title>
<style>
  body {
    background-color: #111; /* Dark background for contrast */
    font-family: 'Impact', sans-serif;
    color: #FF369C;
    margin: 30px;
  }

  h1, h2 {
    margin: 10px 0;
    font-weight: bold;
    text-align: center;
  }

  /* Container for images with responsive grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto 40px;
  }

  /* Images styling */
  .photo-grid img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(255, 54, 156, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  /* Hover zoom effect on images */
  .photo-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(255, 54, 156, 0.8);
  }

  /* Back button styling */
  .back-link {
    display: inline-block;
    margin: 0 auto 40px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    color: #ff7fcf;
    background: #d46a9d;
    padding: 10px 22px;
    border-radius: 30px;
    box-shadow: 0 4px 12px rgba(212, 106, 157, 0.7);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  .back-link:hover {
    background: #ff91c6;
    box-shadow: 0 6px 18px rgba(255, 105, 180, 0.9);
  }

  /* More section container */
  .more {
    max-width: 600px;
    margin: 0 auto;
  }

  .more ul {
    list-style: none;
    padding-left: 0;
  }

  .more li {
    margin-bottom: 15px;
  }

  /* Buttons inside more section */
  .more a h2 {
    background: #e889b5;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    transition: background 0.25s ease, transform 0.25s ease;
  }

  .more a h2:hover {
    background: #d46a9d;
    transform: scale(1.05);
    cursor: pointer;
  }

  /* Section dividers */
  .divider {
    text-align: center;
    font-size: 1.6em;
    margin: 30px 0 20px;
  }
</style>
</head>

<body>

<h1>PERSONAL ₍^. .^₎⟆</h1>
