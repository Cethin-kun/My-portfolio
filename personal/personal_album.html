<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Personal Album</title>
<style>
  body {
    background-color: #111;
    font-family: 'Impact', sans-serif;
    color: #FF369C;
    margin: 30px;
  }

  h1, h2 {
    margin: 10px 0;
    font-weight: bold;
    text-align: center;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto 40px;
  }

  .photo-grid img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(255, 54, 156, 0.4);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  .photo-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(255, 54, 156, 0.8);
  }

  .back-link {
    display: inline-block;
    margin: 0 auto 40px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    color: #ff7fcf;
    background: #d46a9d;
    padding: 10px 22px;
    border-radius: 30px;
    box-shadow: 0 4px 12px rgba(212, 106, 157, 0.7);
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  .back-link:hover {
    background: #ff91c6;
    box-shadow: 0 6px 18px rgba(255, 105, 180, 0.9);
  }

  .more {
    max-width: 600px;
    margin: 0 auto;
  }

  .more ul {
    list-style: none;
    padding-left: 0;
  }

  .more li {
    margin-bottom: 15px;
  }

  .more a h2 {
    background: #e889b5;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    transition: background 0.25s ease, transform 0.25s ease;
  }

  .more a h2:hover {
    background: #d46a9d;
    transform: scale(1.05);
    cursor: pointer;
  }

  .divider {
    text-align: center;
    font-size: 1.6em;
    margin: 30px 0 20px;
  }

  /* Lightbox styles */
  #lightbox-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(28, 28, 31, 0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    cursor: zoom-out;
  }

  #lightbox-overlay img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 15px;
    box-shadow: 0 0 30px #ff369c;
  }

  /* Close button */
  #lightbox-close {
    position: fixed;
    top: 25px;
    right: 30px;
    font-size: 36px;
    color: #ff369c;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    z-index: 10000;
    transition: color 0.3s ease;
  }

  #lightbox-close:hover {
    color: #ffa3d7;
  }
</style>
</head>
<body>

<h1>PERSONAL ₍^. .^₎⟆</h1>

<div class="photo-grid">
  <img src="1.jpg" alt="Photo 1" />
  <img src="2.png" alt="Photo 2" />
  <img src="4.png" alt="Photo 4" />
  <img src="5.png" alt="Photo 5" />
  <img src="6.png" alt="Photo 6" />
  <img src="7.png" alt="Photo 7" />
  <img src="8.jpg" alt="Photo 8" />
  <img src="9.jpg" alt="Photo 9" />
  <img src="10.jpg" alt="Photo 10" />
  <img src="11.jpg" alt="Photo 11" />
  <img src="12.jpg" alt="Photo 12" />
  <img src="13.jpg" alt="Photo 13" />
  <img src="14.jpg" alt="Photo 14" />
  <img src="h1.png" alt="Photo h1" />
  <img src="h2.jpg" alt="Photo h2" />
  <img src="h3.jpg" alt="Photo h3" />
</div>

<div style="text-align:center;">
  <a href="personal.html" class="back-link">⮜ Back</a>
</div>

<div class="more">
  <div class="divider">⋆｡‧˚ʚ MORE ɞ˚‧｡⋆</div>
  <ul>
    <li><a href="collection.html"><h2>COLLECTION (♡ˊ͈ ꒳ ˋ͈)</h2></a></li>
    <li><a href="education.html"><h2>EDUCATION (⩌︿⩌)</h2></a></li>
    <li><a href="family.html"><h2>FAMILY (°ㅁ°)!!</h2></a></li>
  </ul>
</div>

<!-- Lightbox overlay -->
<div id="lightbox-overlay">
  <span id="lightbox-close">&times;</span>
  <img src="" alt="Enlarged image" />
</div>

<script>
  const lightboxOverlay = document.getElementById('lightbox-overlay');
  const lightboxImage = lightboxOverlay.querySelector('img');
  const lightboxClose = document.getElementById('lightbox-close');

  document.querySelectorAll('.photo-grid img').forEach(img => {
    img.addEventListener('click', () => {
      lightboxImage.src = img.src;
      lightboxImage.alt = img.alt;
      lightboxOverlay.style.display = 'flex';
      document.body.style.overflow = 'hidden'; // prevent background scroll
    });
  });

  // Close lightbox when clicking the close button or outside the image
  lightboxClose.addEventListener('click', () => {
    lightboxOverlay.style.display = 'none';
    document.body.style.overflow = '';
  });

  lightboxOverlay.addEventListener('click', (e) => {
    if(e.target === lightboxOverlay){
      lightboxOverlay.style.display = 'none';
      document.body.style.overflow = '';
    }
  });

  // Optional: close on ESC key
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && lightboxOverlay.style.display === 'flex'){
      lightboxOverlay.style.display = 'none';
      document.body.style.overflow = '';
    }
  });
</script>

</body>
</html>
