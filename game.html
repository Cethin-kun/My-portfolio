<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labrat</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Courier New, monospace;
overflow:hidden;
color:#444;

background:linear-gradient(
to bottom,
#ffffff 0%,
#f1f1f1 40%,
#e6e6e6 100%
);
}

/* BACK BUTTON */

.back{
position:fixed;
top:20px;
left:20px;
padding:12px 25px;
background:#555;
color:white;
cursor:pointer;
font-size:18px;
letter-spacing:2px;
transition:.3s;
}

.back:hover{
background:black;
transform:scale(1.05);
}

/* CAMERA SWAY */

.room{
text-align:center;
animation:sway 8s infinite ease-in-out;
}

@keyframes sway{
0%{transform:translateX(-6px) translateY(2px);}
50%{transform:translateX(6px) translateY(-2px);}
100%{transform:translateX(-6px) translateY(2px);}
}

/* FLICKERING LIGHT */

.light{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:radial-gradient(circle at 50% 10%, rgba(255,255,255,.9), rgba(255,255,255,0) 60%);
animation:flicker 5s infinite;
}

@keyframes flicker{
0%{opacity:1;}
48%{opacity:1;}
50%{opacity:.4;}
52%{opacity:1;}
70%{opacity:.7;}
100%{opacity:1;}
}

/* CEILING SHADOW */

.shadow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:linear-gradient(to bottom, rgba(0,0,0,.15), transparent 30%);
animation:shadowMove 6s infinite;
}

@keyframes shadowMove{
0%{opacity:.2;}
50%{opacity:.35;}
100%{opacity:.2;}
}

/* TITLE */

.title{
font-size:70px;
letter-spacing:8px;
margin-bottom:20px;
animation:drift 10s infinite ease-in-out;
}

@keyframes drift{
0%{transform:translateX(0);}
25%{transform:translateX(2px);}
50%{transform:translateX(-3px);}
75%{transform:translateX(1px);}
100%{transform:translateX(0);}
}

.warning{
font-size:24px;
margin-bottom:40px;
opacity:.8;
}

.desc{
font-size:20px;
margin-bottom:90px;
opacity:.6;
}

/* PLAY BUTTON */

.play{
display:inline-block;
padding:20px 60px;
background:#555;
color:white;
font-size:28px;
cursor:pointer;
letter-spacing:3px;
transition:.3s;
}

.play:hover{
background:black;
transform:scale(1.05);
}

/* WHISPERS */

.whisper{
position:fixed;
color:#666;
font-size:22px;
opacity:0;
pointer-events:none;
animation:fadeWhisper 4s ease;
}

@keyframes fadeWhisper{
0%{opacity:0;}
20%{opacity:.5;}
80%{opacity:.5;}
100%{opacity:0;}
}

</style>

</head>

<body>

<div class="light"></div>
<div class="shadow"></div>

<!-- BACK BUTTON -->

<div class="back" onclick="goBack()">Back</div>

<div class="room">

<div class="title">LABRAT</div>

<div class="warning">Warning: This game</div>

<div class="desc">This game is about...</div>

<div class="play" onclick="startGame()">Click to play</div>

</div>

<script>

/* BACK BUTTON */
function goBack(){
  window.location.href="homepage.html";
}

/* DISTANT FOOTSTEPS */
const stepAudio = new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f1e0fcb1a.mp3?filename=footsteps-hallway-ambient-110140.mp3");
stepAudio.volume = 0.15;

setInterval(()=>{
  stepAudio.currentTime=0;
  stepAudio.play();
},20000);

/* WHISPERS */
const whispers = [
  "you shouldn't be here",
  "they are watching",
  "wake up",
  "don't trust them",
  "the experiment continues"
];

function createWhisper(){
  const w = document.createElement("div");
  w.className = "whisper";
  w.innerText = whispers[Math.floor(Math.random()*whispers.length)];
  w.style.left = Math.random()*90 + "vw";
  w.style.top = Math.random()*90 + "vh";
  document.body.appendChild(w);
  setTimeout(()=>{w.remove();},4000);
}

setInterval(createWhisper,8000);

/* START GAME */
function startGame(){
  // Optional animation effect
  document.body.style.transition = "1s";
  document.body.style.background = "black";

  // Redirect to the Itch.io game
  setTimeout(()=>{
    window.location.href = "https://cethin-kun.itch.io/labrat";
  }, 500); // 0.5s delay for smooth transition
}

</script>

</body>
</html>
