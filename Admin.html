<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
padding:40px;
}

textarea{
width:100%;
height:150px;
margin-bottom:20px;
background:#222;
color:white;
border:1px solid #555;
padding:10px;
}

button{
padding:10px 20px;
background:#444;
color:white;
border:none;
cursor:pointer;
}

#blocked{
display:none;
color:red;
font-size:22px;
}

</style>

</head>


<body>

<h1>Admin Panel</h1>

<div id="blocked">
Access denied. This page is for the administrator only.
</div>

<div id="adminPanel">

<h3>Notes Content</h3>

<textarea id="notesBox"></textarea>


<h3>Warnings Content</h3>

<textarea id="warningsBox"></textarea>

<button onclick="saveContent()">Save Changes</button>

</div>


<script>

const savedUser = JSON.parse(localStorage.getItem("user"));

const ADMIN_USERNAME = "Cethin_admin<3";
const ADMIN_PASSWORD = "IamTheCutestAdmin<3";

if(!savedUser || savedUser.username !== ADMIN_USERNAME || savedUser.password !== ADMIN_PASSWORD){

document.getElementById("adminPanel").style.display="none";
document.getElementById("blocked").style.display="block";

}else{

loadContent();

}


function loadContent(){

const notes = localStorage.getItem("notesContent");
const warnings = localStorage.getItem("warningsContent");

if(notes){
document.getElementById("notesBox").value = notes;
}

if(warnings){
document.getElementById("warningsBox").value = warnings;
}

}


function saveContent(){

const notes = document.getElementById("notesBox").value;
const warnings = document.getElementById("warningsBox").value;

localStorage.setItem("notesContent", notes);
localStorage.setItem("warningsContent", warnings);

alert("Content saved!");

}

</script>

</body>
</html>
