<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Family Album</title>

<style>
body{
  background-color:#E6E6FA;
  font-family:'Impact', sans-serif;
  color:#9E7AFF;
  margin:30px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.photo-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:20px;
  max-width:1200px;
  margin:0 auto 40px;
}

.photo-grid img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(158,122,255,0.5);
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  cursor:pointer;
}

.photo-grid img:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(158,122,255,0.9);
}

/* Back button */
.back-link{
  display:inline-block;
  margin:0 auto 40px;
  font-size:18px;
  font-weight:bold;
  text-decoration:none;
  color:white;
  background:#9E7AFF;
  padding:10px 22px;
  border-radius:30px;
  box-shadow:0 4px 12px rgba(158,122,255,0.7);
  transition:background 0.3s ease, box-shadow 0.3s ease;
}

.back-link:hover{
  background:#7a57e6;
  box-shadow:0 6px 18px rgba(158,122,255,0.9);
}

/* More section */
.more{
  max-width:600px;
  margin:0 auto;
}

.more ul{
  list-style:none;
  padding-left:0;
}

.more li{
  margin-bottom:15px;
}

.more a h2{
  background:#b9a6ff;
  padding:12px 25px;
  border-radius:30px;
  color:white;
  display:inline-block;
  width:100%;
  text-align:center;
  transition:background 0.25s ease, transform 0.25s ease;
}

.more a h2:hover{
  background:#9E7AFF;
  transform:scale(1.05);
}

.divider{
  text-align:center;
  font-size:1.6em;
  margin:30px 0 20px;
}

/* Lightbox */
#lightbox-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(230,230,250,0.95);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#lightbox-overlay img{
  max-width:90%;
  max-height:90%;
  border-radius:15px;
  box-shadow:0 0 30px #9E7AFF;
}

#lightbox-close{
  position:fixed;
  top:25px;
  right:30px;
  font-size:36px;
  color:#9E7AFF;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>FAMILY (°ㅁ°)!!</h1>

<div class="photo-grid">
<img src="2.jpg">
<img src="3.jpg">
<img src="7.jpg">
<img src="9.jpg">
<img src="10.jpg">
<img src="12.jpg">
<img src="13.jpg">
<img src="14.jpg">
<img src="15.jpg">
<img src="16.jpg">
<img src="1.jpg">
<img src="4.jpg">
<img src="5.jpg">
<img src="6.jpg">
<img src="11.png">
<img src="8.jpg">
</div>

<div style="text-align:center;">
<a href="https://cethin-kun.github.io/My-portfolio/family.html" class="back-link">⮜ Back</a>
</div>

<div class="more">
<div class="divider">⋆｡‧˚ʚ MORE ɞ˚‧｡⋆</div>
<ul>
<li><a href="https://cethin-kun.github.io/My-portfolio/personal.html"><h2>PERSONAL ₍^. .^₎⟆</h2></a></li>
<li><a href="https://cethin-kun.github.io/My-portfolio/education.html"><h2>EDUCATION (⩌︿⩌)</h2></a></li>
<li><a href="https://cethin-kun.github.io/My-portfolio/collection.html"><h2>COLLECTION (♡ˊ͈ ꒳ ˋ͈)</h2></a></li>
</ul>
</div>

<div id="lightbox-overlay">
<span id="lightbox-close">&times;</span>
<img src="">
</div>

<script>
const overlay = document.getElementById('lightbox-overlay');
const overlayImg = overlay.querySelector('img');
const closeBtn = document.getElementById('lightbox-close');

document.querySelectorAll('.photo-grid img').forEach(img=>{
  img.addEventListener('click',()=>{
    overlayImg.src = img.src;
    overlay.style.display='flex';
    document.body.style.overflow='hidden';
  });
});

closeBtn.onclick=()=>{
  overlay.style.display='none';
  document.body.style.overflow='';
};

overlay.onclick=(e)=>{
  if(e.target===overlay){
    overlay.style.display='none';
    document.body.style.overflow='';
  }
};

document.addEventListener('keydown',(e)=>{
  if(e.key==='Escape'){
    overlay.style.display='none';
    document.body.style.overflow='';
  }
});
</script>

</body>
</html>
