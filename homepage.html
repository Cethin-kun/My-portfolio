<style>

body{
  font-family: Arial;
  background-color:pink;
  color: white;
  margin: 0;
  padding: 0;
}

.header{
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 20px;
  background: #222;
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  box-sizing: border-box;
}

.header span{
  margin-right: auto;
  font-weight: bold;
}

.header button{
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
  margin-left: 10px;
}

.container{
  text-align: center;
  padding-top: 80px;
}

textarea{
  width: 80%;
  height: 200px;
  margin-top: 20px;
  font-size: 16px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  resize: none;
}

textarea.readonly{
  background: #333;
  color: #ccc;
}

button.save-btn{
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: #0a84ff;
  color: white;
  font-size: 16px;
}

</style>
