<!DOCTYPE html>
<html>
<head>
<title>Warnings!</title>

<style>

body{
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  padding: 0;
}

.header{
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 20px;
  background: #222;
  position: fixed;
  width: 100%;
  top: 0;
  left: 0;
  box-sizing: border-box;
}

.header span{
  margin-right: auto;
  font-weight: bold;
}

.header button{
  background: transparent;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  font-weight: bold;
  margin-left: 10px;
}

.container{
  text-align: center;
  padding-top: 80px;
}

textarea{
  width: 80%;
  height: 200px;
  margin-top: 20px;
  font-size: 16px;
  padding: 10px;
  border-radius: 6px;
  border: none;
  resize: none;
}

textarea.readonly{
  background: #333;
  color: #ccc;
}

button.save-btn{
  display: block;
  margin: 20px auto;
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  background: #0a84ff;
  color: white;
  font-size: 16px;
}

</style>

</head>

<body>

<div class="header">
  <span id="usernameDisplay"></span>
  <button onclick="closeDashboard()">× Close</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <h1>Warnings!!!!</h1>
  <p id="welcome"></p>

  <textarea id="dashboardText"></textarea>
  <button id="saveBtn" class="save-btn" onclick="saveText()">Save</button>
</div>

<script>

// Get logged in user
const user = JSON.parse(localStorage.getItem("loggedInUser"))
if(!user){
  window.location.href="index.html"
}

// Show username
document.getElementById("usernameDisplay").innerText = user.username

// Welcome message
document.getElementById("welcome").innerText =
  "Welcome " + user.username + " please enjoy your stay!"

// Load dashboard text
const dashboardText = localStorage.getItem("dashboardText") || "Welcome This page is a  WIP (Work In Progress) and it was made for my ICT Programming class, there will be future updates made to the site, that include a possible in site game, stay tuned!."
const textArea = document.getElementById("dashboardText")
textArea.value = dashboardText

// Admin check
const saveBtn = document.getElementById("saveBtn")
if(user.isAdmin){
  textArea.readOnly = false
  textArea.classList.remove("readonly")
  saveBtn.style.display = "block"
}else{
  textArea.readOnly = true
  textArea.classList.add("readonly")
  saveBtn.style.display = "none"
}

// Save function
function saveText(){
  if(user.isAdmin){
    const text = textArea.value
    localStorage.setItem("dashboardText", text)
    alert("Dashboard text saved!")
  }
}

// Logout function - clears session
function logout(){
  localStorage.removeItem("loggedInUser")
  window.location.href="index.html"
}

// Close dashboard - goes back to desktop without logging out
function closeDashboard(){
  window.location.href="index.html" // desktop page
}

</script>

</body>
</html>
