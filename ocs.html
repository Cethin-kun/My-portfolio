<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Viewer</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#cfcfcf;
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#9b9b9b;
padding:30px 15px;
color:white;
}

.sidebar h1{
font-size:36px;
margin-bottom:10px;
}

.sidebar p{
font-size:14px;
line-height:1.5;
margin-bottom:30px;
}

.menu-btn{
display:block;
width:100%;
margin:15px 0;
padding:10px;
border:none;
background:#bfbfbf;
color:white;
font-size:18px;
cursor:pointer;
}

.menu-btn:hover{
background:#8e8e8e;
}

.main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

.tabs{
display:flex;
background:black;
padding:5px;
}

.tab{
background:white;
padding:6px 15px;
margin-right:5px;
cursor:pointer;
font-size:14px;
}

.tab:hover{
background:#c1c1c1;
}

.content{
flex:1;
display:flex;
background:#bfbfbf;
padding:20px;
}

.fantum-theme{
background:#b91c1c;
color:white;
}

.fantum-theme .line{
border-bottom:2px solid white;
}

.image-box{
width:220px;
height:260px;
background:white;
display:flex;
align-items:center;
justify-content:center;
margin-right:20px;
overflow:hidden;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

.info{
flex:1;
}

.info h2{
margin-top:0;
}

.line{
border-bottom:2px solid black;
margin:20px 0;
}

.back-area{
display:flex;
justify-content:flex-end;
margin-top:10px;
}

.back-btn{
padding:10px 20px;
font-size:16px;
background:#bfbfbf;
border:none;
cursor:pointer;
}

.back-btn:hover{
background:#8e8e8e;
}

</style>
</head>

<body>

<div class="sidebar">

<h1>OCS</h1>

<p>
This page shows my original characters. Choose a category to view their profiles.
</p>

<button class="menu-btn" onclick="showCategory('fantum')">Fantumen</button>
<button class="menu-btn" onclick="showCategory('labrat')">Labrat</button>

</div>

<div class="main">

<div class="tabs" id="tabs"></div>

<div class="content" id="contentArea">

<div class="image-box">
<img id="charImage" src="" alt="Character Image">
</div>

<div class="info">

<h2 id="charName">Character Name</h2>

<p><b>Pronouns:</b> <span id="charPronouns"></span></p>
<p><b>Job:</b> <span id="charJob"></span></p>

<div class="line"></div>

<p id="charDescription">
Character description will appear here.
</p>

</div>

</div>

<div class="back-area">
<button class="back-btn" onclick="goBack()">Back</button>
</div>

</div>

<script>

const characters = {

fantum:[

{
name:"Risitto (Rosi)",
pronouns:"He/him, They/Them, it/its",
job:"Theater Actor/Director/Owner",
description:"A man very passionate about his work, family, and husband. Devoting all his time to things that he love, before he had his family and husband, he spent 100% of his time in the theater, working on productions, and making sure his co-actors were thoroughly taken care of. After one particular show he spots a peculiar looking man in the audience, and from that moment forward he vowed that he would make that man his husband, and he sucessfully did so, even raising children with that same man.",
image:"assets/mc_home.png"
},

{
name:"Fantumen 2",
pronouns:"She/Her",
job:"Watcher",
description:"Observes the world silently.",
image:"images/fantumen2.png"
},

{
name:"Fantumen 3",
pronouns:"He/Him",
job:"Wanderer",
description:"Travels through dimensions.",
image:"images/fantumen3.png"
},

{
name:"Fantumen 4",
pronouns:"They/Them",
job:"Shadow",
description:"A being hiding between worlds.",
image:"images/fantumen4.png"
},

{
name:"Fantumen 5",
pronouns:"She/They",
job:"Guide",
description:"Helps lost souls find their path.",
image:"images/fantumen5.png"
}

],

labrat:[

{
name:"Patient 01",
pronouns:"He/Him",
job:"Patient",
description:"Subject of experimentation.",
image:"images/patient1.png"
},

{
name:"Doctor X",
pronouns:"She/Her",
job:"Doctor",
description:"Lead scientist.",
image:"images/doctorx.png"
},

{
name:"Patient 02",
pronouns:"They/Them",
job:"Test Subject",
description:"Another experimental subject.",
image:"images/patient2.png"
},

{
name:"Researcher A",
pronouns:"He/Him",
job:"Scientist",
description:"Collects lab data.",
image:"images/researcherA.png"
},

{
name:"Researcher B",
pronouns:"She/Her",
job:"Scientist",
description:"Assists experiments.",
image:"images/researcherB.png"
},

{
name:"Specimen Z",
pronouns:"Unknown",
job:"Unknown",
description:"An unidentified entity kept in containment.",
image:"images/specimenZ.png"
}

]

};

let currentCategory="fantum";

function showCategory(category){

currentCategory=category;

const tabs=document.getElementById("tabs");
const content=document.getElementById("contentArea");

tabs.innerHTML="";

content.classList.remove("fantum-theme");

if(category==="fantum"){
content.classList.add("fantum-theme");
}

characters[category].forEach((char,index)=>{

const tab=document.createElement("div");
tab.className="tab";
tab.innerText=char.name;

tab.onclick=()=>loadCharacter(index);

tabs.appendChild(tab);

});

loadCharacter(0);

}

function loadCharacter(index){

const char=characters[currentCategory][index];

document.getElementById("charName").innerText=char.name;
document.getElementById("charPronouns").innerText=char.pronouns;
document.getElementById("charJob").innerText=char.job;
document.getElementById("charDescription").innerText=char.description;

document.getElementById("charImage").src=char.image;

}

function goBack(){
showCategory(currentCategory);
}

</script>

</body>
</html>
