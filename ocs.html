<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Viewer</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#cfcfcf;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#9b9b9b;
padding:30px 15px;
color:white;
}

.sidebar h1{
font-size:36px;
margin-bottom:10px;
}

.sidebar p{
font-size:14px;
line-height:1.5;
margin-bottom:30px;
}

.menu-btn{
display:block;
width:100%;
margin:15px 0;
padding:10px;
border:none;
background:#bfbfbf;
color:white;
font-size:18px;
cursor:pointer;
transition:all .25s ease;
}

.menu-btn:hover{
background:#8e8e8e;
transform:translateY(-2px);
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

/* TABS */

.tabs{
display:flex;
background:black;
padding:5px;
overflow-x:auto;
}

.tab{
background:white;
padding:6px 15px;
margin-right:5px;
cursor:pointer;
font-size:14px;
transition:all .25s ease;
white-space:nowrap;
}

.tab:hover{
background:#c1c1c1;
transform:translateY(-2px);
}

.tab.active{
background:#8e8e8e;
color:white;
}

/* CONTENT */

.content{
flex:1;
display:flex;
background:#bfbfbf;
padding:20px;
animation:fadeIn .4s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* FANTUM THEME */

.fantum-theme{
background:#b91c1c;
color:white;
}

.fantum-theme .line{
border-bottom:2px solid white;
}

/* IMAGE */

.image-box{
width:220px;
height:260px;
background:white;
display:flex;
align-items:center;
justify-content:center;
margin-right:20px;
overflow:hidden;
border-radius:6px;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .35s ease;
}

.image-box img:hover{
transform:scale(1.08);
}

/* INFO */

.info{
flex:1;
animation:slideIn .35s ease;
}

@keyframes slideIn{
from{
opacity:0;
transform:translateX(20px);
}
to{
opacity:1;
transform:translateX(0);
}
}

.info h2{
margin-top:0;
}

.line{
border-bottom:2px solid black;
margin:20px 0;
}

/* BACK BUTTON */

.back-area{
display:flex;
justify-content:flex-end;
margin-top:10px;
}

.back-btn{
padding:10px 20px;
font-size:16px;
background:#bfbfbf;
border:none;
cursor:pointer;
transition:all .25s ease;
}

.back-btn:hover{
background:#8e8e8e;
transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="sidebar">

<h1>OCS</h1>

<p>
This page shows my original characters. Choose a category to view their profiles.
</p>

<button class="menu-btn" onclick="showCategory('fantum')">Fantumen</button>
<button class="menu-btn" onclick="showCategory('labrat')">Labrat</button>

</div>

<div class="main">

<div class="tabs" id="tabs"></div>

<div class="content" id="contentArea">

<div class="image-box">
<img id="charImage" src="assets/ocs/missing.png" alt="Character Image">
</div>

<div class="info">

<h2 id="charName">Character Name</h2>

<p><b id="jobLabel">Job:</b> <span id="charJob"></span></p>
<p><b>Pronouns:</b> <span id="charPronouns"></span></p>

<div class="line"></div>

<p id="charDescription">
Character description will appear here.
</p>

</div>

</div>

<div class="back-area">
<button class="back-btn" onclick="goBack()">Back</button>
</div>

</div>

<script>

const characters = {

fantum: [

{
name:"Risitto (Rosi)",
pronouns:"He/him, They/Them, it/its",
job:"Theater Actor / Director / Owner",
description:"When he was a young nocturan he led many demons escaping Pandemoneus and helped them live better lives. After 100 years he settled down and built a theater from scratch. It began as a small stage with friends, but over time it became Fantumen’s most famous theater. After 150 years he noticed a demon in the crowd who watched him perform with admiration. Eventually Rosi fell in love with him and made him his husband. They raised two sons together until tragedy struck when Radiance soldiers attacked them for not being human. His husband was killed protecting them. Since then Rosi became extremely protective of his children, leading one to run away and forcing Rosi to search for him.",
image:"assets/ocs/rosi.png"
},

{
name:"Cethin Darkshade",
pronouns:"He/Him, it/its",
job:"Painter",
description:"[Information yet to be added.]",
image:"assets/ocs/cethin.png"
},

{
name:"Kage Macaroni Darkshade",
pronouns:"He/Him",
job:"Casino Owner",
description:"[Information yet to be added.]",
image:"assets/ocs/kage.png"
},

{
name:"Shadow Fagottini Darkshade",
pronouns:"They/Them, He/Him",
job:"Entertainer",
description:"[Information yet to be added.]",
image:"assets/ocs/shadow.png"
},

{
name:"To be added",
pronouns:"???",
job:"???",
description:"??",
image:"assets/ocs/missing.png"
}

],

labrat: [

{
name:"Risotto Darkshade",
pronouns:"He/Him, They/Them",
role:"Doctor / Caretaker",
description:"His goal is to revive his late husband’s image by turning his experiment into someone identical to his husband’s old portraits while manipulating the experiment to behave the same way.",
image:"assets/ocs/docros.png"
},

{
name:"#0911 \"Cethin\"",
pronouns:"It/its",
role:"Clone attempt",
description:"A man who woke up in a white room. The player can choose to fall in love with Doctor Risotto or attempt to escape, but a sinking feeling suggests the ending will always be the same.",
image:"assets/ocs/0911.png"
},

{
name:"Owen",
pronouns:"He/Him",
role:"Scientist",
description:"[Information not found.]",
image:"assets/ocs/owen.png"
},

{
name:"#1003 Kage",
pronouns:"He/Him",
role:"Patient",
description:"[Information not found.]",
image:"assets/ocs/1003.png"
},

{
name:"Kahel",
pronouns:"He/Him, They/Them",
role:"Mycologist",
description:"[Information not found.]",
image:"assets/ocs/kahel.png"
},

{
name:"#1422 Homura",
pronouns:"He/Him",
role:"Patient",
description:"Subject of experimentation.",
image:"assets/ocs/1422.png"
}

]

};

let currentCategory = "fantum";

function showCategory(category){

currentCategory = category;

const tabs = document.getElementById("tabs");
const content = document.getElementById("contentArea");

tabs.innerHTML = "";

content.classList.remove("fantum-theme");

if(category === "fantum"){
content.classList.add("fantum-theme");
}

characters[category].forEach((char,index)=>{

const tab=document.createElement("div");

tab.className="tab";
tab.innerText=char.name;

tab.onclick=()=>loadCharacter(index);

tabs.appendChild(tab);

});

loadCharacter(0);

}

function loadCharacter(index){

const char=characters[currentCategory][index];

document.getElementById("charName").innerText=char.name;
document.getElementById("charPronouns").innerText=char.pronouns;
document.getElementById("charDescription").innerText=char.description;

document.getElementById("charImage").src = char.image || "assets/ocs/missing.png";

const label=document.getElementById("jobLabel");

if(currentCategory==="fantum"){
label.innerText="Job:";
document.getElementById("charJob").innerText=char.job;
}else{
label.innerText="Role:";
document.getElementById("charJob").innerText=char.role;
}

/* highlight active tab */

document.querySelectorAll(".tab").forEach((t,i)=>{
t.classList.toggle("active",i===index);
});

}

function goBack(){
window.location.href="homepage.html";
}

showCategory("fantum");

</script>

</body>
</html>
