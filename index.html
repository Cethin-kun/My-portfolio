<!DOCTYPE html>
<html>
<head>
<title>Desktop</title>
<style>
body {
  background-image: url("assets/start screen/windows.jpg");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  background-attachment: fixed; 
  height: 100vh; 
  margin: 0; 
  padding: 0;
  font-family: sans-serif;
}

.iCons {
  display: flex;
  gap: 20px;
  padding: 40px;
}

button {
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
}

img {
  width: 100px;
}

.hotbar {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  height: auto;
}

.hotbar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Window Modals */
.modal {
  display: none;
  position: fixed;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  color: white;
  border: 2px solid #555;
  width: 400px;
  max-width: 90%;
  padding: 20px;
  border-radius: 10px;
  z-index: 1000;
}

.modal h3 {
  margin-top: 0;
}

.closeBtn {
  position: absolute;
  top: 5px;
  right: 10px;
  font-size: 20px;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="iCons">
  <button onclick="openNotes()">
    <img src="assets/start screen/NotesIcon.png">
    Notes
  </button>

  <button onclick="openWarnings()">
    <img src="assets/start screen/WarningsIcon.png">
    Warnings
  </button>

  <button id="adminBtn" onclick="openAdmin()" style="display:none">
    <img src="assets/start screen/adminIcon.png">
    Admin
  </button>
</div>

<div class="hotbar">
  <img src="assets/start screen/hotbar.png">
</div>

<!-- Notes Window -->
<div id="notesModal" class="modal">
  <span class="closeBtn" onclick="closeModal('notesModal')">&times;</span>
  <h3>Notes</h3>
  <div id="notesContent" style="white-space: pre-wrap;"></div>
</div>

<!-- Warnings Window -->
<div id="warningsModal" class="modal">
  <span class="closeBtn" onclick="closeModal('warningsModal')">&times;</span>
  <h3>Warnings</h3>
  <div id="warningsContent" style="white-space: pre-wrap;"></div>
</div>

<script>
function openNotes(){
  const notes = localStorage.getItem("notesContent") || "No notes yet.";
  document.getElementById("notesContent").innerText = notes;
  document.getElementById("notesModal").style.display = "block";
}

function openWarnings(){
  const warnings = localStorage.getItem("warningsContent") || "No warnings yet.";
  document.getElementById("warningsContent").innerText = warnings;
  document.getElementById("warningsModal").style.display = "block";
}

function closeModal(modalId){
  document.getElementById(modalId).style.display = "none";
}

function openAdmin(){
  window.location.href = "admin.html";
}

// Show admin button only for admin
function showAdminButton(){
  const user = JSON.parse(localStorage.getItem("loggedInUser"));
  if(user && user.username === "Cethin_admin<3"){
    document.getElementById("adminBtn").style.display = "block";
  }
}

window.addEventListener("load", showAdminButton);

</script>

</body>
</html>
