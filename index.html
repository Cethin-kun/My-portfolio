<!DOCTYPE html>
<html>

<head>
<title>Desktop</title>
<style>
body {
  background-image: url("assets/start screen/windows.jpg");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  background-attachment: fixed; 
  height: 100vh; 
  margin: 0; 
  padding: 0;
}

button {
    background-color: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: none;
}

a {
    background-color: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: none;
}

 .iCons {
    display: flex;
 }
       
 .hotbar {
    position:fixed;
    left:-1px;
    bottom:0px;
    width:100hv;
    height:auto;
    overflow: hidden;
 }

 .hotbar img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover; /* This scales the image to cover the entire container while maintaining aspect ratio and cropping excess */
  bottom: -1px;
 }

h3 {
  color:red;
}

/* Start button */
#startBtn{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

/* Background overlay */
.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;
}

/* Popup box */
.modal-content{
    background:white;
    width:350px;
    padding:25px;
    border-radius:12px;
    position:relative;

    /* animation starting state */
    transform:scale(0.7);
    opacity:0;
    transition:all 0.3s ease;
}

/* Active animation */
.modal.show .modal-content{
    transform:scale(1);
    opacity:1;
    transition: all 0.15s ease;
}

/* Close button */
.close{
    position:absolute;
    right:12px;
    top:8px;
    font-size:22px;
    cursor:pointer;
}

/* Tabs */
.tabs{
    display:flex;
}

.tabs button{
    flex:1;
    padding:10px;
    border:none;
    cursor:pointer;
}

/* Tab content */
.tab-content{
    display:none;
    margin-top:15px;
}

input{
    width:100%;
    padding:8px;
    margin:6px 0;
}

.submit-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    cursor:pointer;
}

.tab-content{
    display:none;
    margin-top:15px;
    opacity:0;
    transform:translateX(20px);
}

/* active tab */
.tab-content.active{
    display:block;
    animation:slideFade 0.35s ease forwards;
}

@keyframes slideFade{
    from{
        opacity:0;
        transform:translateX(20px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

</style>

</head>

<body>

<div class="iCons">

<button>
<img style="width:100px;" src="assets/start screen/NotesIcon.png">
</button>

<button>
<img style="width:100px;" src="assets/start screen/WarningsIcon.png">
</button>

<button id="startBtn">
<img style="width:100px;" src="assets/start screen/startIcon.png">
</button>

</div>


<div class="hotbar">
<img src="assets/start screen/hotbar.png">
</div>


<!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<div class="tabs">
<button onclick="showTab('login')">Login</button>
<button onclick="showTab('signup')">Sign Up</button>
<button onclick="toggleTheme()">Toggle Theme</button>
</div>


<!-- LOGIN -->

<div id="login" class="tab-content">

<h3>Login</h3>

<input id="loginUsername" type="text" placeholder="Username">

<input id="loginPassword" type="password" placeholder="Password">

<button id="loginSubmit" class="submit-btn">Login</button>

</div>


<!-- SIGN UP -->

<div id="signup" class="tab-content">

<h3>Sign Up</h3>

<input id="signupUsername" type="text" placeholder="Username">

<input id="signupPassword" type="password" placeholder="Password">

<button id="signupSubmit" class="submit-btn">Create Account</button>

</div>

</div>
</div>

<button id="adminBtn" onclick="openAdmin()" style="display:none;">
<img style="width:100px;" src="assets/start screen/adminIcon.png">
</button>

<button onclick="openNotes()">
<img style="width:100px;" src="assets/start screen/NotesIcon.png">
</button>
  
<script src="modal.js"></script>
<script src="auth.js"></script>
<script>

const notes = localStorage.getItem("notesContent") || "No notes yet.";

alert(notes);

}
function openAdmin(){

}

if(user && user.username === "Cethin_admin<3"){

document.getElementById("adminBtn").style.display = "block";

}

}


/* Check if admin is already logged in */

window.addEventListener("load", function(){

showAdminButton();

});
</script>

</body>

</html>
