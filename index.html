<!DOCTYPE html>
<html>
<head>
<title>Desktop</title>

<style>

body{
  background-image: url("assets/start screen/windows.jpg");
  background-repeat:no-repeat;
  background-position:center;
  background-size:cover;
  height:100vh;
  margin:0;
}

button{
background:transparent;
border:none;
cursor:pointer;
}

.icons{
display:flex;
gap:20px;
padding:20px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:320px;
}

.tabs{
display:flex;
gap:5px;
}

.tabs button{
flex:1;
padding:8px;
background:#ddd;
}

.tab-content{
display:none;
margin-top:15px;
}

.tab-content.active{
display:block;
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

.submit-btn{
width:100%;
padding:10px;
background:#333;
color:white;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div class="icons">

<button onclick="openNotes()">
<img style="width:100px;" src="assets/start screen/NotesIcon.png">
</button>

<button onclick="openWarnings()">
<img style="width:100px;" src="assets/start screen/WarningsIcon.png">
</button>

<!-- NOTES WINDOW -->

<div id="notesWindow" class="window">

<div class="window-header">
<span>Notes</span>
<button onclick="closeWindow('notesWindow')">X</button>
</div>

<div class="window-content">

<textarea id="notesText"></textarea>

<button onclick="saveNotes()">Save Notes</button>

</div>
</div>
  
<!-- WARNINGS WINDOW -->

<div id="warningsWindow" class="window">

<div class="window-header">
<span>Warnings</span>
<button onclick="closeWindow('warningsWindow')">X</button>
</div>

<div class="window-content">

<textarea id="warningsText"></textarea>

<button id="saveWarningsBtn" onclick="saveWarnings()">Save</button>

</div>
</div>
  
<button id="startBtn">
<img width="80" src="assets/start screen/startIcon.png">
</button>

</div>

<!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<div class="tabs">
<button onclick="showTab('login')">Login</button>
<button onclick="showTab('signup')">Sign Up</button>
</div>

<div id="login" class="tab-content active">

<h3>Login</h3>

<input id="loginUsername" placeholder="Username">
<input id="loginPassword" type="password" placeholder="Password">

<button id="loginSubmit" class="submit-btn">Login</button>

</div>

<div id="signup" class="tab-content">

<h3>Sign Up</h3>

<input id="signupUsername" placeholder="Username">
<input id="signupPassword" type="password" placeholder="Password">

<button id="signupSubmit" class="submit-btn">Create Account</button>

</div>

</div>
</div>

<script src="auth.js"></script>

<script>

/* START BUTTON */

const modal = document.getElementById("loginModal")

document.getElementById("startBtn").onclick = () =>{
modal.style.display="flex"
}

/* CLOSE */

document.querySelector(".close").onclick = () =>{
modal.style.display="none"
}

/* TAB SWITCH */

function showTab(tab){

document.querySelectorAll(".tab-content").forEach(t=>{
t.classList.remove("active")
})

document.getElementById(tab).classList.add("active")

}

/* NOTES */

function openNotes(){

const user = JSON.parse(localStorage.getItem("loggedInUser"))

if(!user){
alert("Please login first")
return
}

let notes = localStorage.getItem("notes_"+user.username) || "No notes yet"

let newNotes = prompt("Your Notes:",notes)

if(newNotes !== null){
localStorage.setItem("notes_"+user.username,newNotes)
}

}

/* WARNINGS */

function openWarnings(){

let warnings = localStorage.getItem("warnings") || "No warnings"

const user = JSON.parse(localStorage.getItem("loggedInUser"))

if(user && user.isAdmin){

let newText = prompt("Edit warnings:",warnings)

if(newText !== null){
localStorage.setItem("warnings",newText)
}

}else{

alert(warnings)

}

}

</script>

</body>
</html>
