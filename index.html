<!DOCTYPE html>
<html>

<head>
<title>Desktop</title>

<link id="theme-link" rel="stylesheet" href="light.css">

</head>

<body>

<div class="iCons">

<button>
<img style="width:100px;" src="assets/start screen/NotesIcon.png">
</button>

<button>
<img style="width:100px;" src="assets/start screen/WarningsIcon.png">
</button>

<button id="startBtn">
<img style="width:100px;" src="assets/start screen/startIcon.png">
</button>

</div>


<div class="hotbar">
<img src="assets/start screen/hotbar.png">
</div>


<!-- LOGIN MODAL -->

<div id="loginModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<div class="tabs">
<button onclick="showTab('login')">Login</button>
<button onclick="showTab('signup')">Sign Up</button>
<button onclick="toggleTheme()">Toggle Theme</button>
</div>


<!-- LOGIN -->

<div id="login" class="tab-content">

<h3>Login</h3>

<input id="loginUsername" type="text" placeholder="Username">

<input id="loginPassword" type="password" placeholder="Password">

<button id="loginSubmit" class="submit-btn">Login</button>

</div>


<!-- SIGN UP -->

<div id="signup" class="tab-content">

<h3>Sign Up</h3>

<input id="signupUsername" type="text" placeholder="Username">

<input id="signupEmail" type="email" placeholder="Email">

<input id="signupPassword" type="password" placeholder="Password">

<button id="signupSubmit" class="submit-btn">Create Account</button>

</div>

</div>
</div>



<script src="modal.js"></script>
<script src="theme.js"></script>
<script src="auth.js"></script>

</body>

</html>
