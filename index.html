<!DOCTYPE html>
<html>
    <head>
        <title>Desktop</title>
     <style>
        body {
  background-image: url("assets/start screen/windows.jpg");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  background-attachment: fixed; 
  height: 100vh; 
  margin: 0; 
  padding: 0;
}

button {
    background-color: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: none;
}

a {
    background-color: transparent;
    border: none;
    cursor: pointer;
    padding: 0;
    outline: none;
}

 .iCons {
    display: flex;
 }
       
 .hotbar {
    position:fixed;
    left:-1px;
    bottom:0px;
    width:100hv;
    height:auto;
    overflow: hidden;
 }

 .hotbar img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* This scales the image to cover the entire container while maintaining aspect ratio and cropping excess */
}

/* Start button */
#startBtn{
    padding:12px 25px;
    font-size:18px;
    cursor:pointer;
}

/* Background overlay */
.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);

    justify-content:center;
    align-items:center;
}

/* Popup box */
.modal-content{
    background:white;
    width:350px;
    padding:25px;
    border-radius:12px;
    position:relative;

    /* animation starting state */
    transform:scale(0.7);
    opacity:0;
    transition:all 0.3s ease;
}

/* Active animation */
.modal.show .modal-content{
    transform:scale(1);
    opacity:1;
    transition: all 0.15s ease;
}

/* Close button */
.close{
    position:absolute;
    right:12px;
    top:8px;
    font-size:22px;
    cursor:pointer;
}

/* Tabs */
.tabs{
    display:flex;
}

.tabs button{
    flex:1;
    padding:10px;
    border:none;
    cursor:pointer;
    background:#eee;
}

.tabs button:hover{
    background:#ddd;
}

/* Tab content */
.tab-content{
    display:none;
    margin-top:15px;
}

input{
    width:100%;
    padding:8px;
    margin:6px 0;
}

.submit-btn{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
}

.tab-content{
    display:none;
    margin-top:15px;
    opacity:0;
    transform:translateX(20px);
}

/* active tab */
.tab-content.active{
    display:block;
    animation:slideFade 0.35s ease forwards;
}

@keyframes slideFade{
    from{
        opacity:0;
        transform:translateX(20px);
    }
    to{
        opacity:1;
        transform:translateX(0);
    }
}

     </style>
     </head>
<body>
    <div class="iCons">
        <button type="button" onclick="alert('Notes opened!')">
         <img style="width: 100px; height: auto;" src="assets/start screen/NotesIcon.png" alt="Description of the button's action">
        </button>
        
        <button type="button" onclick="alert('Warnings opened!')">
         <img style="width: 100px; height: auto;" src="assets/start screen/WarningsIcon.png" alt="Description of the button's action">
        </button>
       
        <button type="button" id="startBtn">
         <img style="width: 100px; height: auto;" src="assets/start screen/startIcon.png" alt="Description of the button's action">
        </button>
    </div>
        <div class="hotbar">
          <img id="hotbar" src="assets/start screen/hotbar.png" alt="Description of the button's action">
        </div>



<div id="loginModal" class="modal">

<div class="modal-content">

<span class="close">&times;</span>

<div class="tabs">
<button onclick="showTab('login')">Login</button>
<button onclick="showTab('signup')">Sign Up</button>
</div>

<div id="login" class="tab-content">
<h3>Login</h3>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button class="submit-btn">Login</button>
</div>

<div id="signup" class="tab-content">
<h3>Sign Up</h3>
<input type="text" placeholder="Username">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button class="submit-btn">Create Account</button>
</div>

</div>
</div>

    <script>

const modal = document.getElementById("loginModal");
const startBtn = document.getElementById("startBtn");
const closeBtn = document.querySelector(".close");

startBtn.onclick = () => {
    modal.style.display = "flex";

    setTimeout(() => {
        modal.classList.add("show");
    },10);

    showTab("login");
}

closeBtn.onclick = closeModal;

window.onclick = function(event){
    if(event.target === modal){
        closeModal();
    }
}

function closeModal(){
    modal.classList.remove("show");

    setTimeout(()=>{
        modal.style.display="none";
    },300);
}

function showTab(tab){

    const tabs = document.querySelectorAll(".tab-content");

    tabs.forEach(t => {
        t.classList.remove("active");
    });

    const selectedTab = document.getElementById(tab);

    if(selectedTab){
        selectedTab.classList.add("active");
    }

}

</script>


</body>
</html>
